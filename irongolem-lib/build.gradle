plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'io.irongolem'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'irongolem-lib-neoforge'
        }
    }
    repositories {
        mavenLocal()
    }
}
